name: "CI/CD — Auth Backend [PROD]"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "¿Deployar a AWS PROD? (true = deploy, false = solo build/test)"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  id-token: write
  contents: read

env:
  GO_VERSION: "1.23"
  AWS_REGION: us-east-1
  ENVIRONMENT: prod
  STACK_NAME: demo-ticketing-auth-prod

jobs:
  build-and-test:
    name: "Build & Test (Go — Hexagonal Auth)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/*.sum"

      - name: Run Tests
        run: |
          for lambda_dir in lambdas/*/; do
            echo "▶ Testing $lambda_dir"
            cd "$lambda_dir"
            go test ./... -v -race -timeout 60s || exit 1
            cd ../..
          done

      - name: Build Go binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o lambdas/auth-generate/bootstrap lambdas/auth-generate/main.go
          GOOS=linux GOARCH=amd64 go build -o lambdas/auth-authorizer/bootstrap lambdas/auth-authorizer/main.go

  deploy:
    name: "Deploy → AWS Auth PROD (demo-ticketing-auth-prod)"
    needs: build-and-test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy == 'true' }}
    environment: prod  # requiere aprobación manual en GitHub Environments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/*.sum"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Debe ser un rol OIDC configurado en la cuenta Management para poder hacer assume_role hacia Operations y Auth
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_MANAGEMENT_OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Go binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o lambdas/auth-generate/bootstrap lambdas/auth-generate/main.go
          GOOS=linux GOARCH=amd64 go build -o lambdas/auth-authorizer/bootstrap lambdas/auth-authorizer/main.go

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend-config=backend-prod.conf

      - name: Terraform Apply (PROD)
        working-directory: ./terraform
        run: terraform apply -var-file=prod.tfvars -auto-approve

      - name: Summary
        run: echo "✅ Auth backend deployado exitosamente en AWS (PROD)"
